# Local/demo monitoring stack. Run from repo root:
#   docker compose -f monitoring/docker-compose.monitoring.yml up --build
#
# This mirrors what Container Insights + a Grafana instance (fed by CloudWatch or a
# self-hosted Prometheus on ECS) gives you in AWS - useful for local development
# and for demoing the Grafana dashboard before wiring it to production data sources.

services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8080:8080"

  prometheus:
    image: prom/prometheus:v2.55.1
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - app

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro

  grafana:
    image: grafana/grafana:11.2.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards/json
    depends_on:
      - prometheus
