spring.application.name=taskmaster
server.port=8080

# Actuator / health / metrics - used by ECS health checks, ALB target group, and Prometheus scraping
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=${spring.application.name}
management.prometheus.metrics.export.enabled=true

# Structured logging to stdout -> picked up by ECS awslogs driver -> CloudWatch Logs
logging.level.root=INFO
logging.level.com.taskmaster=INFO